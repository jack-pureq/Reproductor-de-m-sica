<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jimmy Jack Waqrapfuko — Música & Radio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600;800;900&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#0a0a0c;--bg2:#111116;--card:#18181e;--card-hover:#22222a;
            --border:#2a2a35;--fg:#f0ece4;--muted:#8a8694;
            --accent:#d4a843;--accent2:#e8c46a;--accent-glow:rgba(212,168,67,0.25);
            --red:#c0392b;--green:#27ae60;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden}

        .bg-scene{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
        .bg-blob{position:absolute;border-radius:50%;filter:blur(120px);opacity:.25;animation:blobF 14s ease-in-out infinite alternate}
        .bg-blob:nth-child(1){width:500px;height:500px;background:var(--accent);top:-150px;left:-100px}
        .bg-blob:nth-child(2){width:400px;height:400px;background:#8b4513;bottom:-100px;right:-80px;animation-delay:-5s;animation-duration:17s}
        .bg-blob:nth-child(3){width:300px;height:300px;background:#c0392b;top:40%;left:60%;opacity:.12;animation-delay:-9s;animation-duration:20s}
        @keyframes blobF{0%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,-30px) scale(1.1)}100%{transform:translate(-20px,20px) scale(.95)}}

        .bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;
            background-image:linear-gradient(rgba(212,168,67,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(212,168,67,.03) 1px,transparent 1px);
            background-size:60px 60px}

        ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}
        ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--accent)}

        .app-container{position:relative;z-index:1;padding-bottom:120px}

        .app-header{backdrop-filter:blur(20px);background:rgba(10,10,12,.7);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
        .logo-text{font-family:'Space Grotesk',sans-serif;font-weight:700;
            background:linear-gradient(135deg,var(--accent),var(--accent2),#fff,var(--accent));background-size:200% 200%;
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 4s ease-in-out infinite}
        @keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

        .tab-btn{position:relative;padding:12px 28px;font-weight:600;font-size:15px;color:var(--muted);background:0;border:0;cursor:pointer;transition:color .3s}
        .tab-btn.active{color:var(--accent)}
        .tab-btn::after{content:'';position:absolute;bottom:-1px;left:50%;width:0;height:3px;background:var(--accent);border-radius:3px 3px 0 0;transition:all .35s cubic-bezier(.4,0,.2,1);transform:translateX(-50%)}
        .tab-btn.active::after{width:60%}.tab-btn:hover{color:var(--fg)}

        .tab-content{display:none;animation:fadeS .4s ease}.tab-content.active{display:block}
        @keyframes fadeS{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

        .drop-zone{border:2px dashed var(--border);border-radius:20px;padding:40px 30px;text-align:center;cursor:pointer;transition:all .35s;background:rgba(24,24,30,.5);position:relative;overflow:hidden}
        .drop-zone::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at center,var(--accent-glow),transparent 70%);opacity:0;transition:opacity .35s}
        .drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);background:rgba(212,168,67,.05)}
        .drop-zone:hover::before,.drop-zone.drag-over::before{opacity:1}

        .upload-btn{display:inline-flex;align-items:center;gap:10px;padding:14px 28px;border-radius:14px;border:1px solid var(--border);background:var(--card);color:var(--fg);font-size:15px;font-weight:600;cursor:pointer;transition:all .25s;font-family:'Outfit',sans-serif}
        .upload-btn:hover{border-color:var(--accent);background:var(--card-hover);transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,.3)}
        .upload-btn i{font-size:20px;color:var(--accent)}

        .song-item{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:12px;cursor:pointer;transition:all .25s;border:1px solid transparent;animation:songIn .3s ease backwards}
        .song-item:hover{background:var(--card-hover);border-color:var(--border)}
        .song-item.playing{background:rgba(212,168,67,.08);border-color:rgba(212,168,67,.25)}
        @keyframes songIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}

        .song-thumb{width:46px;height:46px;border-radius:10px;background:linear-gradient(135deg,var(--card),var(--card-hover));display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:16px;flex-shrink:0}

        .radio-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px;cursor:pointer;transition:all .35s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
        .radio-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transform:scaleX(0);transform-origin:left;transition:transform .35s}
        .radio-card:hover{border-color:rgba(212,168,67,.3);transform:translateY(-3px);box-shadow:0 10px 35px rgba(0,0,0,.4)}
        .radio-card:hover::before{transform:scaleX(1)}
        .radio-card.active{border-color:var(--accent);background:rgba(212,168,67,.06);box-shadow:0 0 35px var(--accent-glow)}
        .radio-card.active::before{transform:scaleX(1)}

        .radio-icon{width:58px;height:58px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--bg);font-weight:800;flex-shrink:0}
        .radio-live-dot{width:8px;height:8px;border-radius:50%;background:var(--red);display:inline-block;animation:liveP 1.5s ease-in-out infinite}
        .radio-card.active .radio-live-dot{background:var(--green)}
        @keyframes liveP{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

        .eq-bars{display:flex;align-items:flex-end;gap:2px;height:18px}
        .eq-bar{width:3px;background:var(--accent);border-radius:2px;animation:eqB .8s ease-in-out infinite alternate}
        .eq-bar:nth-child(1){height:7px;animation-delay:0s}.eq-bar:nth-child(2){height:14px;animation-delay:.15s}
        .eq-bar:nth-child(3){height:9px;animation-delay:.3s}.eq-bar:nth-child(4){height:16px;animation-delay:.1s}
        .eq-bar:nth-child(5){height:5px;animation-delay:.25s}
        @keyframes eqB{from{height:3px}to{height:18px}}
        .eq-bars.paused .eq-bar{animation-play-state:paused}

        .visualizer-container{height:70px;border-radius:14px;overflow:hidden;background:rgba(24,24,30,.6);border:1px solid var(--border)}
        #visualizerCanvas{width:100%;height:100%;display:block}

        .player-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;backdrop-filter:blur(30px) saturate(1.5);background:rgba(10,10,12,.85);border-top:1px solid var(--border);padding:0 20px}
        .player-bar::before{content:'';position:absolute;top:-1px;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.5}

        .progress-wrap{position:absolute;top:-4px;left:0;right:0;height:6px;cursor:pointer;z-index:10}
        .progress-track{width:100%;height:100%;background:var(--border);position:relative}
        .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:0 3px 3px 0;width:0%;transition:width .1s linear;position:relative}
        .progress-fill::after{content:'';position:absolute;right:-6px;top:50%;transform:translateY(-50%) scale(0);width:14px;height:14px;border-radius:50%;background:var(--accent2);box-shadow:0 0 10px var(--accent-glow);transition:transform .2s}
        .progress-wrap:hover .progress-fill::after{transform:translateY(-50%) scale(1)}

        .ctrl-btn{background:0;border:0;color:var(--muted);cursor:pointer;padding:10px;border-radius:50%;transition:all .25s;display:flex;align-items:center;justify-content:center;font-size:18px}
        .ctrl-btn:hover{color:var(--fg);background:rgba(255,255,255,.06)}
        .play-btn{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg)!important;font-size:20px;box-shadow:0 4px 20px var(--accent-glow);transition:all .3s cubic-bezier(.4,0,.2,1)}
        .play-btn:hover{transform:scale(1.08);box-shadow:0 6px 30px rgba(212,168,67,.4)}
        .play-btn:active{transform:scale(.96)}

        .volume-slider{-webkit-appearance:none;appearance:none;width:85px;height:4px;border-radius:2px;background:var(--border);outline:none;cursor:pointer}
        .volume-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 8px var(--accent-glow)}

        .toast{position:fixed;top:80px;right:20px;z-index:200;padding:14px 22px;border-radius:12px;background:var(--card);border:1px solid var(--border);color:var(--fg);font-size:14px;box-shadow:0 8px 30px rgba(0,0,0,.5);transform:translateX(120%);transition:transform .4s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;gap:10px;max-width:380px}
        .toast.show{transform:translateX(0)}

        .loading-spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:none}
        @keyframes spin{to{transform:rotate(360deg)}}

        .status-badge{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
        .status-connecting{background:rgba(212,168,67,.15);color:var(--accent)}
        .status-live{background:rgba(39,174,96,.15);color:var(--green)}
        .status-error{background:rgba(192,57,43,.15);color:var(--red)}

        .retry-btn{background:0;border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px;transition:all .2s;font-family:'Outfit',sans-serif}
        .retry-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(212,168,67,.05)}

        .web-btn{background:0;border:1px solid rgba(39,174,96,.3);color:var(--green);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px;transition:all .2s;font-family:'Outfit',sans-serif}
        .web-btn:hover{background:rgba(39,174,96,.1);border-color:var(--green)}

        /* Overlay de carga inicial */
        .init-overlay{position:fixed;inset:0;z-index:300;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .5s}
        .init-overlay.hide{opacity:0;pointer-events:none}

        .floating-note{position:fixed;pointer-events:none;z-index:0;font-size:20px;opacity:.06;animation:floatN linear infinite;color:var(--accent)}
        @keyframes floatN{0%{transform:translateY(100vh) rotate(0);opacity:0}10%{opacity:.06}90%{opacity:.06}100%{transform:translateY(-100px) rotate(360deg);opacity:0}}

        .storage-bar{height:4px;border-radius:2px;background:var(--border);overflow:hidden;flex:1;max-width:200px}
        .storage-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}

        @media(max-width:768px){
            .player-info-text{display:none}.volume-group{display:none!important}
            .player-bar{padding:0 10px}.radio-grid{grid-template-columns:1fr!important}
            .upload-btns{flex-direction:column!important}
        }
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
    </style>
</head>
<body>
    <!-- Fondo -->
    <div class="bg-scene"><div class="bg-blob"></div><div class="bg-blob"></div><div class="bg-blob"></div></div>
    <div class="bg-grid"></div>
    <div id="floatingNotes"></div>

    <!-- Overlay de carga -->
    <div class="init-overlay" id="initOverlay">
        <div style="width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;">
            <i class="fas fa-music" style="color:var(--bg);font-size:22px;"></i>
        </div>
        <p style="font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:600;">Cargando tu biblioteca...</p>
        <div class="loading-spinner" style="display:block;width:28px;height:28px;border-width:3px;"></div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="fas fa-info-circle" style="color:var(--accent);" id="toastIcon"></i>
        <span id="toastMsg"></span>
    </div>

    <!-- App -->
    <div class="app-container">
        <header class="app-header">
            <div class="max-w-6xl mx-auto px-5 py-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div style="width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;">
                        <i class="fas fa-music" style="color:var(--bg);font-size:16px;"></i>
                    </div>
                    <h1 class="logo-text text-xl tracking-tight">SonidoPeru</h1>
                </div>
                <div class="flex items-center gap-2" style="color:var(--muted);font-size:12px;">
                    <i class="fas fa-database" style="color:var(--accent);font-size:10px;"></i>
                    <span id="headerCount">0 canciones</span>
                </div>
            </div>
            <div class="max-w-6xl mx-auto px-5 flex gap-1">
                <button class="tab-btn active" data-tab="music" onclick="switchTab('music')">
                    <i class="fas fa-headphones-alt mr-2" style="font-size:13px;"></i>Mi Musica
                </button>
                <button class="tab-btn" data-tab="radio" onclick="switchTab('radio')">
                    <i class="fas fa-broadcast-tower mr-2" style="font-size:13px;"></i>Radio Peru
                </button>
            </div>
        </header>

        <main class="max-w-6xl mx-auto px-5 py-8">
            <!-- Tab: Música -->
            <section class="tab-content active" id="tab-music">
                <!-- Botones de carga -->
                <div class="upload-btns flex gap-4 mb-5" style="flex-direction:row;">
                    <button class="upload-btn flex-1" onclick="document.getElementById('fileInput').click()">
                        <i class="fas fa-file-audio"></i>
                        <div class="text-left">
                            <div style="font-size:15px;">Seleccionar archivos</div>
                            <div style="font-size:12px;color:var(--muted);font-weight:400;">MP3, WAV, OGG, FLAC</div>
                        </div>
                    </button>
                    <button class="upload-btn flex-1" onclick="document.getElementById('folderInput').click()">
                        <i class="fas fa-folder-open"></i>
                        <div class="text-left">
                            <div style="font-size:15px;">Seleccionar carpeta</div>
                            <div style="font-size:12px;color:var(--muted);font-weight:400;">Escanea todas las subcarpetas</div>
                        </div>
                    </button>
                    <input type="file" id="fileInput" accept="audio/*" multiple style="display:none">
                    <input type="file" id="folderInput" webkitdirectory directory multiple style="display:none">
                </div>

                <!-- Drop zone -->
                <div class="drop-zone" id="dropZone">
                    <div style="position:relative;z-index:1;">
                        <i class="fas fa-cloud-upload-alt" style="font-size:36px;color:var(--accent);margin-bottom:14px;display:block;"></i>
                        <p style="font-size:16px;font-weight:600;">Arrastra archivos o carpetas aqui</p>
                        <p style="color:var(--muted);font-size:13px;margin-top:6px;">Se guardaran automaticamente para la proxima vez</p>
                    </div>
                </div>

                <!-- Visualizador -->
                <div class="visualizer-container mt-5" id="vizContainer" style="display:none;">
                    <canvas id="visualizerCanvas"></canvas>
                </div>

                <!-- Lista + info de almacenamiento -->
                <div id="songList" class="mt-5"></div>

                <div id="storageInfo" class="mt-5 flex items-center justify-between" style="display:none;padding:12px 16px;background:var(--card);border-radius:12px;border:1px solid var(--border);">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-database" style="color:var(--accent);font-size:13px;"></i>
                        <span id="storageText" style="font-size:13px;color:var(--muted);">0 canciones · 0 MB</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="storage-bar"><div class="storage-fill" id="storageFill" style="width:0%"></div></div>
                        <button onclick="clearLibrary()" style="background:0;border:1px solid var(--border);color:var(--red);padding:5px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-family:'Outfit',sans-serif;transition:all .2s;" onmouseover="this.style.borderColor='var(--red)';this.style.background='rgba(192,57,43,.08)'" onmouseout="this.style.borderColor='var(--border)';this.style.background='0'">
                            <i class="fas fa-trash-alt mr-1"></i>Limpiar todo
                        </button>
                    </div>
                </div>
            </section>

            <!-- Tab: Radio -->
            <section class="tab-content" id="tab-radio">
                <div class="mb-6">
                    <h2 style="font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;">Emisoras Nacionales</h2>
                    <p style="color:var(--muted);margin-top:4px;font-size:14px;">Radios del Peru en vivo. Si una no conecta, usa el boton verde para escuchar desde su pagina oficial.</p>
                </div>
                <div class="radio-grid" id="radioGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px;"></div>
            </section>
        </main>
    </div>

    <!-- Reproductor -->
    <div class="player-bar" id="playerBar" style="display:none;">
        <div class="progress-wrap" id="progressWrap">
            <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        </div>
        <div class="flex items-center justify-between" style="height:76px;">
            <div class="flex items-center gap-3 flex-1 min-w-0" style="max-width:280px;">
                <div class="song-thumb" id="playerThumb" style="width:46px;height:46px;border-radius:10px;"><i class="fas fa-music"></i></div>
                <div class="min-w-0 player-info-text">
                    <p id="playerTitle" style="font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">—</p>
                    <p id="playerArtist" style="color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">—</p>
                </div>
                <div class="eq-bars paused" id="playerEq" style="display:none;">
                    <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
                </div>
            </div>
            <div class="flex items-center gap-1">
                <button class="ctrl-btn" onclick="toggleShuffle()" id="shuffleBtn" title="Aleatorio"><i class="fas fa-random"></i></button>
                <button class="ctrl-btn" onclick="playPrev()" title="Anterior"><i class="fas fa-step-backward"></i></button>
                <button class="ctrl-btn play-btn" onclick="togglePlay()" id="mainPlayBtn" title="Reproducir"><i class="fas fa-play" id="playIcon"></i></button>
                <button class="ctrl-btn" onclick="playNext()" title="Siguiente"><i class="fas fa-step-forward"></i></button>
                <button class="ctrl-btn" onclick="toggleRepeat()" id="repeatBtn" title="Repetir"><i class="fas fa-redo"></i></button>
            </div>
            <div class="flex items-center gap-3 flex-1 justify-end">
                <span id="timeDisplay" style="font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;min-width:80px;text-align:center;">0:00 / 0:00</span>
                <div class="volume-group flex items-center gap-2" style="display:flex;">
                    <button class="ctrl-btn" onclick="toggleMute()" style="padding:8px;font-size:15px;"><i class="fas fa-volume-up" id="volIcon"></i></button>
                    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80" oninput="setVolume(this.value)">
                </div>
                <div class="loading-spinner" id="loadingSpinner"></div>
            </div>
        </div>
    </div>

    <script>
    // ================================================================
    // BASE DE DATOS INDEXEDDB — Persistencia entre sesiones
    // ================================================================
    class MusicDB {
        constructor() {
            this.dbName = 'SonidoPeruDB';
            this.version = 1;
            this.db = null;
        }

        open() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(this.dbName, this.version);
                req.onupgradeneeded = e => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('songs')) {
                        db.createObjectStore('songs', { keyPath: 'id' });
                    }
                };
                req.onsuccess = e => { this.db = e.target.result; resolve(); };
                req.onerror = e => reject(e.target.error);
            });
        }

        // Guardar una canción (blob + metadatos)
        addSong(song) {
            return new Promise((resolve, reject) => {
                const tx = this.db.transaction('songs', 'readwrite');
                tx.objectStore('songs').add(song);
                tx.oncomplete = () => resolve();
                tx.onerror = e => reject(e.target.error);
            });
        }

        // Obtener todas las canciones
        getAll() {
            return new Promise((resolve, reject) => {
                const tx = this.db.transaction('songs', 'readonly');
                const req = tx.objectStore('songs').getAll();
                req.onsuccess = () => resolve(req.result);
                req.onerror = e => reject(e.target.error);
            });
        }

        // Eliminar una canción
        deleteSong(id) {
            return new Promise((resolve, reject) => {
                const tx = this.db.transaction('songs', 'readwrite');
                tx.objectStore('songs').delete(id);
                tx.oncomplete = () => resolve();
                tx.onerror = e => reject(e.target.error);
            });
        }

        // Limpiar toda la biblioteca
        clear() {
            return new Promise((resolve, reject) => {
                const tx = this.db.transaction('songs', 'readwrite');
                tx.objectStore('songs').clear();
                tx.oncomplete = () => resolve();

    // Procesar archivos: detectar duplicados, guardar en IndexedDB, actualizar UI
    async function processAudioFiles(files) {
        let added = 0, skipped = 0;
        showToast(`Procesando ${files.length} archivos...`, 'info');

        for (const file of files) {
            // Detectar duplicados por nombre + tamaño
            const isDuplicate = state.songs.some(s => s.name === file.name.replace(/\.[^/.]+$/, '') && s.blob.size === file.size);
            if (isDuplicate) { skipped++; continue; }

            const id = Date.now().toString(36) + Math.random().toString(36).substr(2, 6);
            const name = file.name.replace(/\.[^/.]+$/, '');
            const parts = name.includes(' - ') ? name.split(' - ') : [name, 'Desconocido'];

            const song = {
                id,
                name: parts[0].trim(),
                artist: parts.length > 1 ? parts[1].trim() : 'Desconocido',
                blob: file,
                url: URL.createObjectURL(file),
                addedAt: Date.now()
            };

            try {
                await db.addSong(song);
                state.songs.push(song);
                added++;
            } catch (err) {
                if (err.name === 'QuotaExceededError') {
                    showToast('Almacenamiento lleno. Elimina algunas canciones.', 'error');
                    break;
                }
                console.error('Error guardando:', err);
            }
        }

        renderSongList();
        updateStorageInfo();
        updateHeaderCount();

        let msg = `${added} cancion${added !== 1 ? 'es' : ''} guardada${added !== 1 ? 's' : ''}`;
        if (skipped > 0) msg += ` (${skipped} duplicada${skipped !== 1 ? 's' : ''} omitida${skipped !== 1 ? 's' : ''})`;
        showToast(msg, added > 0 ? 'success' : 'warning');

        if (added > 0) {
            document.getElementById('vizContainer').style.display = 'block';
            if (state.currentIndex === -1) loadSong(0);
        }
    }

    // ================================================================
    // DRAG & DROP — Soporta archivos Y carpetas con lectura recursiva
    // ================================================================
    function setupDragDrop() {
        const zone = document.getElementById('dropZone');

        ['dragenter', 'dragover'].forEach(evt => {
            zone.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); zone.classList.add('drag-over'); });
        });
        ['dragleave', 'drop'].forEach(evt => {
            zone.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); zone.classList.remove('drag-over'); });
        });

        zone.addEventListener('drop', async e => {
            const items = e.dataTransfer.items;
            const audioFiles = [];

            if (items) {
                for (const item of items) {
                    // Intentar obtener como Entry (para carpetas)
                    const entry = item.webkitGetAsEntry ? item.webkitGetAsEntry() : null;
                    if (entry) {
                        const files = await readEntryRecursive(entry);
                        audioFiles.push(...files);
                    } else if (item.kind === 'file') {
                        const file = item.getAsFile();
                        if (file && file.type.startsWith('audio/')) audioFiles.push(file);
                    }
                }
            } else {
                // Fallback para navegadores sin webkitGetAsEntry
                audioFiles.push(...[...e.dataTransfer.files].filter(f => f.type.startsWith('audio/')));
            }

            if (audioFiles.length) await processAudioFiles(audioFiles);
            else showToast('No se encontraron archivos de audio', 'warning');
        });
    }

    // Lectura recursiva de carpetas (Entry API)
    async function readEntryRecursive(entry) {
        if (entry.isFile) {
            return new Promise(resolve => {
                entry.file(file => {
                    resolve(file.type.startsWith('audio/') ? [file] : []);
                }, () => resolve([]));
            });
        } else if (entry.isDirectory) {
            const reader = entry.createReader();
            let allEntries = [];
            let batch;
            do {
                batch = await new Promise((resolve, reject) => reader.readEntries(resolve, reject));
                allEntries.push(...batch);
            } while (batch.length > 0);

            const files = [];
            for (const e of allEntries) {
                files.push(...await readEntryRecursive(e));
            }
            return files;
        }
        return [];
    }

    async function removeSong(index) {
        const wasPlaying = index === state.currentIndex && !state.isRadio;
        const song = state.songs[index];

        URL.revokeObjectURL(song.url);
        try { await db.deleteSong(song.id); } catch (e) {}

        state.songs.splice(index, 1);

        if (state.songs.length === 0) {
            state.currentIndex = -1; state.isPlaying = false;
            audio.pause(); audio.src = '';
            document.getElementById('playerBar').style.display = 'none';
            document.getElementById('vizContainer').style.display = 'none';
        } else if (wasPlaying) {
            state.currentIndex = Math.min(index, state.songs.length - 1);
            loadSong(state.currentIndex);
        } else if (index < state.currentIndex) {
            state.currentIndex--;
        }

        renderSongList();
        updateStorageInfo();
        updateHeaderCount();
        showToast('Cancion eliminada', 'success');
    }

    async function clearLibrary() {
        if (state.songs.length === 0) return;
        // Revocar todas las URLs
        state.songs.forEach(s => URL.revokeObjectURL(s.url));
        try { await db.clear(); } catch (e) {}

        state.songs = [];
        state.currentIndex = -1;
        state.isPlaying = false;
        audio.pause(); audio.src = '';
        document.getElementById('playerBar').style.display = 'none';
        document.getElementById('vizContainer').style.display = 'none';

        renderSongList();
        updateStorageInfo();
        updateHeaderCount();
        showToast('Biblioteca limpiada', 'success');
    }

        const pct = Math.min(100, (totalBytes / (500 * 1024 * 1024)) * 100);
        fill.style.width = pct + '%';
        fill.style.background = pct > 80 ? 'var(--red)' : 'var(--accent)';
    }

    function playNext() {
        if (state.isRadio || !state.songs.length) return;

    // ================================================================

    // ================================================================
    function setupProgressClick() {
        document.getElementById('progressWrap').addEventListener('click', e => {
            if (state.isRadio) return;
            const rect = e.currentTarget.getBoundingClientRect();
            const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            if (audio.duration) audio.currentTime = pct * audio.duration;
        });
    }

    function formatTime(s) {
        if (!s || isNaN(s)) return '0:00';
        return Math.floor(s / 60) + ':' + (Math.floor(s % 60) < 10 ? '0' : '') + Math.floor(s % 60);
    }

    // ================================================================
    // EVENTOS DEL AUDIO
    // ================================================================
    function setupAudioEvents() {
        audio.addEventListener('timeupdate', () => {
            if (state.isRadio) return;
            const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('timeDisplay').textContent = formatTime(audio.currentTime) + ' / ' + formatTime(audio.duration);
        });

        audio.addEventListener('ended', () => {
            if (state.isRadio) return;
            if (state.repeat === 2) { audio.currentTime = 0; audio.play(); }
            else if (state.repeat === 1 || state.currentIndex < state.songs.length - 1) playNext();
            else { state.isPlaying = false; updatePlayerUI(); }
        });

        audio.addEventListener('waiting', () => { document.getElementById('loadingSpinner').style.display = 'block'; });
        audio.addEventListener('canplay', () => {
            document.getElementById('loadingSpinner').style.display = 'none';
            if (state.isRadio && state.radioStatus === 'connecting') setRadioStatus('live');
        });
        audio.addEventListener('playing', () => {
            document.getElementById('loadingSpinner').style.display = 'none';
            if (state.isRadio) setRadioStatus('live');
        });
        audio.addEventListener('error', () => {
            document.getElementById('loadingSpinner').style.display = 'none';
            if (state.isRadio) handleRadioError();
        });
    }

    // ================================================================
    // RADIO — SIN crossOrigin (el fix principal)
    // ================================================================
    function clearRadioState() {
        state.isRadio = false;
        state.currentRadioIndex = -1;
        state.currentStreamIndex = 0;
        if (reconnectTimeout) { clearTimeout(reconnectTimeout); reconnectTimeout = null; }
        setRadioStatus('idle');
    }

    function playRadio(index) {
        if (reconnectTimeout) { clearTimeout(reconnectTimeout); reconnectTimeout = null; }

        state.isRadio = true;
        state.currentRadioIndex = index;
        state.currentStreamIndex = 0;
        state.isPlaying = true;

        // QUITAR crossOrigin — este es el fix clave para las radios
        audio.crossOrigin = null;

        document.getElementById('vizContainer').style.display = 'none';
        cancelVisualizer();

        setRadioStatus('connecting');
        updatePlayerUI();
        updateRadioCards();
        document.getElementById('playerBar').style.display = 'block';

        tryStream(index, 0);
    }

    function tryStream(radioIndex, streamIndex) {
        const radio = radios[radioIndex];
        if (streamIndex >= radio.streams.length) {
            setRadioStatus('error');
            return;
        }

        state.currentStreamIndex = streamIndex;
        const url = radio.streams[streamIndex];

        if (reconnectTimeout) clearTimeout(reconnectTimeout);
        reconnectTimeout = setTimeout(() => {
            if (state.isRadio && state.currentRadioIndex === radioIndex && state.radioStatus === 'connecting') {
                tryStream(radioIndex, streamIndex + 1);
            }
        }, 10000);

        audio.src = url;
        audio.load();
        audio.play().catch(() => {
            if (state.isRadio && state.currentRadioIndex === radioIndex) handleRadioError();
        });
    }

    function handleRadioError() {
        if (!state.isRadio) return;
        tryStream(state.currentRadioIndex, state.currentStreamIndex + 1);
    }

    function retryRadio(index) {
        playRadio(index);
        showToast('Reconectando con ' + radios[index].name + '...', 'info');
    }

    function openRadioWeb(index) {
        window.open(radios[index].web, '_blank');
    }

    function setRadioStatus(status) {
        state.radioStatus = status;
        updateRadioCards();
        document.getElementById('playerEq').classList.toggle('paused', status !== 'live');
    }

    function updatePlayerUI() {
        document.getElementById('playIcon').className = state.isPlaying ? 'fas fa-pause' : 'fas fa-play';

        if (state.isRadio && state.currentRadioIndex >= 0) {
            const r = radios[state.currentRadioIndex];
            document.getElementById('playerTitle').textContent = r.name;
            const labels = { connecting: 'Conectando...', live: 'EN VIVO', error: 'Sin conexion', idle: '' };
            document.getElementById('playerArtist').textContent = r.freq + ' — ' + (labels[state.radioStatus] || '');
            document.getElementById('playerEq').style.display = 'flex';
            document.getElementById('timeDisplay').textContent = labels[state.radioStatus] || '';
            document.getElementById('progressFill').style.width = state.radioStatus === 'live' ? '100%' : '0%';
            document.getElementById('playerThumb').innerHTML = `<span style="font-weight:800;font-size:18px;color:${r.color};">${r.icon}</span>`;
            document.getElementById('playerThumb').style.background = 'var(--card)';
        } else if (state.currentIndex >= 0 && state.songs[state.currentIndex]) {
            const s = state.songs[state.currentIndex];
            document.getElementById('playerTitle').textContent = s.name;
            document.getElementById('playerArtist').textContent = s.artist;
            document.getElementById('playerEq').style.display = 'none';
            document.getElementById('playerThumb').innerHTML = '<i class="fas fa-music"></i>';
            document.getElementById('playerThumb').style.background = '';
        }
    }

    // ================================================================
    // TARJETAS DE RADIO
    // ================================================================
    function renderRadioGrid() {
        const grid = document.getElementById('radioGrid');
        grid.innerHTML = radios.map((r, i) => `
            <div class="radio-card" id="radio-${i}" onclick="playRadio(${i})" role="button" tabindex="0">
                <div class="flex items-start gap-4">
                    <div class="radio-icon" style="background:${r.color};">${r.icon}</div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="radio-live-dot" id="rDot-${i}"></span>
                            <span id="rStat-${i}" style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;">En vivo</span>
                        </div>
                        <h3 style="font-weight:700;font-size:16px;margin-bottom:1px;">${r.name}</h3>
                        <p style="color:var(--muted);font-size:13px;">${r.freq}</p>
                        <p style="color:var(--muted);font-size:12px;margin-top:3px;">${r.genre}</p>
                    </div>
                    <div class="flex flex-col items-end gap-2">
                        <div class="eq-bars paused" id="rEq-${i}">
                            <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
                        </div>
                        <button class="retry-btn" id="rRetry-${i}" style="display:none;" onclick="event.stopPropagation();retryRadio(${i})">
                            <i class="fas fa-sync-alt mr-1" style="font-size:10px;"></i>Reconectar
                        </button>
                        <button class="web-btn" id="rWeb-${i}" style="display:none;" onclick="event.stopPropagation();openRadioWeb(${i})">
                            <i class="fas fa-external-link-alt mr-1" style="font-size:10px;"></i>Escuchar en web
                        </button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function updateRadioCards() {
        radios.forEach((_, i) => {
            const card = document.getElementById('radio-' + i);
            const eq = document.getElementById('rEq-' + i);
            const stat = document.getElementById('rStat-' + i);
            const retry = document.getElementById('rRetry-' + i);
            const web = document.getElementById('rWeb-' + i);
            const dot = document.getElementById('rDot-' + i);
            if (!card) return;

            const active = state.isRadio && state.currentRadioIndex === i;
            card.classList.toggle('active', active);

            if (active) {
                if (state.radioStatus === 'live') {
                    eq.classList.remove('paused');
                    stat.innerHTML = '<span class="status-badge status-live"><i class="fas fa-signal"></i> Conectado</span>';
                    retry.style.display = 'none'; web.style.display = 'none';
                    dot.style.background = 'var(--green)';
                } else if (state.radioStatus === 'connecting') {
                    eq.classList.add('paused');
                    stat.innerHTML = '<span class="status-badge status-connecting"><i class="fas fa-spinner fa-spin"></i> Conectando...</span>';
                    retry.style.display = 'none'; web.style.display = 'none';
                    dot.style.background = 'var(--accent)';
                } else if (state.radioStatus === 'error') {
                    eq.classList.add('paused');
                    stat.innerHTML = '<span class="status-badge status-error"><i class="fas fa-exclamation-triangle"></i> Sin senal</span>';
                    retry.style.display = 'block'; web.style.display = 'block';
                    dot.style.background = 'var(--red)';
                }
            } else {
                eq.classList.add('paused');
                stat.innerHTML = '<span style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;">En vivo</span>';
                retry.style.display = 'none'; web.style.display = 'none';
                dot.style.background = 'var(--red)';
            }
        });
    }

    // ================================================================
    // VISUALIZADOR
    // ================================================================
    function initVisualizer() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (!sourceNode) {
            try {
                sourceNode = audioCtx.createMediaElementSource(audio);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                sourceNode.connect(analyser);
                analyser.connect(audioCtx.destination);
            } catch (e) {}
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        drawVisualizer();
    }

    function cancelVisualizer() {
        if (vizAnimFrame) { cancelAnimationFrame(vizAnimFrame); vizAnimFrame = null; }
    }

    function drawVisualizer() {
        const canvas = document.getElementById('visualizerCanvas');
        if (!canvas || !analyser) return;
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;

        function resize() {
            const r = canvas.parentElement.getBoundingClientRect();
            canvas.width = r.width * dpr; canvas.height = r.height * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        resize();
        window.addEventListener('resize', resize);

        const buf = new Uint8Array(analyser.frequencyBinCount);

        function draw() {
            vizAnimFrame = requestAnimationFrame(draw);
            analyser.getByteFrequencyData(buf);
            const w = canvas.width / dpr, h = canvas.height / dpr;
            ctx.clearRect(0, 0, w, h);
            const n = Math.min(buf.length, 70);
            const tw = w / n, bw = tw * 0.7;

            for (let i = 0; i < n; i++) {
                const v = buf[i] / 255;
                const bh = Math.max(2, v * h * 0.9);
                const x = i * tw + (tw - bw) / 2, y = h - bh;
                const hue = 35 + v * 20;
                const g = ctx.createLinearGradient(x, y, x, h);
                g.addColorStop(0, `hsla(${hue},80%,65%,0.95)`);
                g.addColorStop(0.5, `hsla(${hue},70%,50%,0.7)`);
                g.addColorStop(1, `hsla(${hue},60%,35%,0.3)`);
                ctx.fillStyle = g;
                ctx.beginPath();
                const r = Math.min(bw / 2, 3);
                ctx.moveTo(x, h); ctx.lineTo(x, y + r);
                ctx.quadraticCurveTo(x, y, x + r, y);
                ctx.lineTo(x + bw - r, y);
                ctx.quadraticCurveTo(x + bw, y, x + bw, y + r);
                ctx.lineTo(x + bw, h); ctx.closePath(); ctx.fill();
            }
        }
        draw();
    }

    // ================================================================
    // UTILIDADES
    // ================================================================
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
        document.querySelectorAll('.tab-content').forEach(s => s.classList.toggle('active', s.id === 'tab-' + tab));
    }

    let toastTimer = null;
    function showToast(msg, type = 'info') {
        const t = document.getElementById('toast');
        const ic = document.getElementById('toastIcon');
        document.getElementById('toastMsg').textContent = msg;
        ic.className = type === 'success' ? 'fas fa-check-circle' : type === 'error' ? 'fas fa-exclamation-circle' : type === 'warning' ? 'fas fa-exclamation-triangle' : 'fas fa-info-circle';
        ic.style.color = type === 'error' ? 'var(--red)' : type === 'success' ? 'var(--green)' : 'var(--accent)';
        t.classList.add('show');
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
    }

    function createFloatingNotes() {
        const c = document.getElementById('floatingNotes');
        const n = ['♪','♫','♬','♩'];
        for (let i = 0; i < 8; i++) {
            const d = document.createElement('div');
            d.className = 'floating-note';
            d.textContent = n[i % n.length];
            d.style.left = Math.random() * 100 + '%';
            d.style.animationDuration = (18 + Math.random() * 20) + 's';
            d.style.animationDelay = -(Math.random() * 25) + 's';
            d.style.fontSize = (16 + Math.random() * 14) + 'px';
            c.appendChild(d);
        }
    }

    // ================================================================
    // ATAJOS DE TECLADO
    // ================================================================
    document.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT') return;
        switch (e.code) {
            case 'Space': e.preventDefault(); togglePlay(); break;
            case 'ArrowRight': if (!state.isRadio && audio.duration) audio.currentTime = Math.min(audio.duration, audio.currentTime + 5); break;
            case 'ArrowLeft': if (!state.isRadio && audio.duration) audio.currentTime = Math.max(0, audio.currentTime - 5); break;
            case 'ArrowUp': e.preventDefault(); state.volume = Math.min(1, state.volume + .05); audio.volume = state.volume; document.getElementById('volumeSlider').value = state.volume * 100; updateVolumeIcon(); break;
            case 'ArrowDown': e.preventDefault(); state.volume = Math.max(0, state.volume - .05); audio.volume = state.volume; document.getElementById('volumeSlider').value = state.volume * 100; updateVolumeIcon(); break;
            case 'KeyN': playNext(); break;
            case 'KeyP': playPrev(); break;
            case 'KeyM': toggleMute(); break;
        }
    });
    </script>
</body>
</html>
